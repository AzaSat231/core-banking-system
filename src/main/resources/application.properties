# Bind to loopback only; middleware reaches this via Caddy mTLS (api.local).
server.address=127.0.0.1

# Host port 5332 maps to postgres-spring-boot in docker-compose.yml (TLS required).
# Run graduation_project/scripts/gen_postgres_server_cert.sh before docker compose up.
spring.datasource.url=jdbc:postgresql://localhost:5332/dbv1?sslmode=verify-full&sslrootcert=${POSTGRES_SSL_ROOT:${user.home}/atm-tls/postgres/ca.pem}
spring.datasource.username=dbv1
spring.datasource.password=pass123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
app.jwt.secret=ThisIsAVeryLongSecretKeyForCoreBankingAppThatIsAtLeast256Bits!
# In seconds
app.jwt.expiration=86400000

# Shared secret used by ServiceTokenAuthFilter to authenticate the in-middleware
# reconciliation worker for /admin/** endpoints. Override via the
# MIDDLEWARE_SERVICE_TOKEN env var in any non-dev environment.
app.middleware.service-token=${MIDDLEWARE_SERVICE_TOKEN:dev-only-change-me}

# ATM withdraw: auto-reverse if dispense ACK not received in time (seconds).
dispense.ack-timeout-seconds=30
dispense.reversal-poll-ms=5000