# Bind to loopback only; middleware reaches this via Caddy mTLS (api.local).
server.address=127.0.0.1

# Host port 5332 maps to postgres-spring-boot in docker-compose.yml (TLS required).
# Run graduation_project/scripts/gen_postgres_server_cert.sh before docker compose up.
spring.datasource.url=jdbc:postgresql://localhost:5332/dbv1?sslmode=verify-full&sslrootcert=${POSTGRES_SSL_ROOT:${user.home}/atm-tls/postgres/ca.pem}
spring.datasource.username=dbv1
spring.datasource.password=pass123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
app.jwt.secret=ThisIsAVeryLongSecretKeyForCoreBankingAppThatIsAtLeast256Bits!
# In seconds
app.jwt.expiration=86400000

# Shared secret used by ServiceTokenAuthFilter to authenticate the in-middleware
# reconciliation worker for /admin/** endpoints. Override via the
# MIDDLEWARE_SERVICE_TOKEN env var in any non-dev environment.
app.middleware.service-token=${MIDDLEWARE_SERVICE_TOKEN:dev-only-change-me}

# ATM withdraw: auto-reverse if dispense ACK not received in time (seconds).
dispense.ack-timeout-seconds=30
dispense.reversal-poll-ms=5000

# Outbound card notification email (sent on every card issuance).
# Configure via environment variables for local/dev.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.notifications.card-email.enabled=${CARD_EMAIL_ENABLED:true}
app.notifications.card-email.from=${CARD_EMAIL_FROM:no-reply@corebank.local}
app.notifications.card-email.bank-name=${CARD_EMAIL_BANK_NAME:Core Banking}
app.notifications.card-email.atm-url=${CARD_EMAIL_ATM_URL:https://atm.local}
app.notifications.card-email.logo-classpath=${CARD_EMAIL_LOGO_CLASSPATH:email/bytebridge-logo.png}